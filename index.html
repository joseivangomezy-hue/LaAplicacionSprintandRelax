<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Metaetiquetas para PWA y comportamiento nativo en iOS/Android -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0A0A0C">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Sprint & Relax App</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome para Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- MP4Box para extraer metadatos del video (Auto-FPS) -->
    <script src="https://unpkg.com/mp4box@0.5.3/dist/mp4box.all.min.js"></script>

    <style>
        /* CSS para comportamiento 100% nativo (PWA App) */
        :root { color-scheme: dark; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            background-color: #0A0A0C;
            overscroll-behavior: none;
        }
        html { overscroll-behavior: none; }
        
        input, textarea, select {
            user-select: auto;
            -webkit-user-select: auto;
            font-size: 16px !important;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Componentes de Iconos ---
        const Icon = ({ name, size = 18, className = "" }) => (
            <i className={`${name} ${className}`} style={{ fontSize: size, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: size, height: size }}></i>
        );
        const Dumbbell = (p) => <Icon name="fa-solid fa-dumbbell" {...p} />;
        const Timer = (p) => <Icon name="fa-solid fa-stopwatch" {...p} />;
        const Plus = (p) => <Icon name="fa-solid fa-plus" {...p} />;
        const Trash2 = (p) => <Icon name="fa-solid fa-trash-can" {...p} />;
        const Save = (p) => <Icon name="fa-solid fa-floppy-disk" {...p} />;
        const ChevronLeft = (p) => <Icon name="fa-solid fa-chevron-left" {...p} />;
        const ChevronRight = (p) => <Icon name="fa-solid fa-chevron-right" {...p} />;
        const ArrowLeft = (p) => <Icon name="fa-solid fa-arrow-left" {...p} />;
        const X = (p) => <Icon name="fa-solid fa-xmark" {...p} />;
        const Clock = (p) => <Icon name="fa-regular fa-clock" {...p} />;
        const Waves = (p) => <Icon name="fa-solid fa-water" {...p} />;
        const Zap = (p) => <Icon name="fa-solid fa-bolt" {...p} />;
        const FileText = (p) => <Icon name="fa-regular fa-file-lines" {...p} />;
        const Calendar = (p) => <Icon name="fa-regular fa-calendar" {...p} />;
        const Activity = (p) => <Icon name="fa-solid fa-chart-line" {...p} />;
        const Trophy = (p) => <Icon name="fa-solid fa-trophy" {...p} />;
        const StickyNote = (p) => <Icon name="fa-regular fa-note-sticky" {...p} />;
        const CheckCircle2 = (p) => <Icon name="fa-regular fa-circle-check" {...p} />;
        const Moon = (p) => <Icon name="fa-solid fa-moon" {...p} />;
        const Smartphone = (p) => <Icon name="fa-solid fa-mobile-screen-button" {...p} />;
        const Pen = (p) => <Icon name="fa-solid fa-pen" {...p} />;
        const Calculator = (p) => <Icon name="fa-solid fa-calculator" {...p} />;
        const VideoIcon = (p) => <Icon name="fa-solid fa-video" {...p} />;
        const Youtube = (p) => <Icon name="fa-brands fa-youtube" {...p} />;
        const StepBackward = (p) => <Icon name="fa-solid fa-backward-step" {...p} />;
        const StepForward = (p) => <Icon name="fa-solid fa-forward-step" {...p} />;
        const User = (p) => <Icon name="fa-solid fa-user" {...p} />;

        // --- Utilidades para Gráficas de Test ---
        const parseTestValue = (val) => {
            if (!val) return 0;
            const str = val.toString().trim();
            if (str.includes(':')) {
                const [m, s] = str.split(':');
                return parseInt(m || 0) * 60 + parseFloat(s || 0);
            }
            return parseFloat(str.replace(',', '.')) || 0;
        };

        const TEST_COLORS = ['#10B981', '#3B82F6', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899', '#06B6D4'];

        const MultiTestChart = ({ tests, hiddenTests }) => {
            const activeTests = tests.filter(t => !hiddenTests.has(t.id) && t.records && t.records.length > 0);
            
            if (activeTests.length === 0) return <div className="text-[10px] text-center text-[#71717A] py-8 bg-[#0A0A0C]/30 rounded-[16px] border border-[#27272A]/50 border-dashed my-2">No hay datos suficientes para mostrar la gráfica</div>;

            // Encontrar rango global de fechas para el eje X
            let allDates = [];
            activeTests.forEach(t => t.records.forEach(r => allDates.push(new Date(r.date).getTime())));
            
            const minDate = Math.min(...allDates);
            const maxDate = Math.max(...allDates);
            const dateRange = maxDate - minDate === 0 ? 86400000 : maxDate - minDate; // Mínimo 1 día

            const padding = 20;
            const w = 400;
            const h = 160;

            return (
                <div className="w-full pt-4 pb-2 relative">
                    <svg viewBox={`0 0 ${w} ${h}`} className="w-full h-auto drop-shadow-md overflow-visible">
                        {activeTests.map(test => {
                            if(test.records.length < 2) return null; // Necesita al menos 2 puntos
                            
                            const sorted = [...test.records].sort((a, b) => new Date(a.date) - new Date(b.date));
                            const isTimeBased = sorted.some(r => r.value.toString().includes(':'));
                            
                            const parsed = sorted.map(r => parseTestValue(r.value));
                            const minVal = Math.min(...parsed);
                            const maxVal = Math.max(...parsed);
                            const range = maxVal - minVal === 0 ? 1 : maxVal - minVal;

                            const points = sorted.map((r, i) => {
                                const time = new Date(r.date).getTime();
                                const x = padding + ((time - minDate) / dateRange) * (w - padding * 2);
                                
                                const normalizedY = (parseTestValue(r.value) - minVal) / range;
                                // Si es tiempo (ej. 3:30), un valor menor es MEJOR (va arriba).
                                // Si es reps/peso (ej. 15), un valor mayor es MEJOR (va arriba).
                                const y = isTimeBased 
                                    ? padding + normalizedY * (h - padding * 2) 
                                    : h - padding - normalizedY * (h - padding * 2);
                                
                                return { x, y, val: r.value };
                            });

                            const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x},${p.y}`).join(' ');
                            const color = test.color || '#10B981';

                            return (
                                <g key={test.id}>
                                    <path d={pathD} fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="drop-shadow-sm opacity-90" />
                                    {points.map((p, i) => (
                                        <circle key={i} cx={p.x} cy={p.y} r="4" fill="#0A0A0C" stroke={color} strokeWidth="2.5" />
                                    ))}
                                </g>
                            );
                        })}
                    </svg>
                </div>
            );
        };

        // --- Logo Personalizado (Samurai + Bombero) ---
        const SamuraiFireHelmet = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M5 14l-2 3.5C2 19 3 21 6 21h12c3 0 4-2 3.5-3.5L19 14" />
                <path d="M4.5 17.5h15" />
                <path d="M5 14v-3a7 7 0 0 1 14 0v3" />
                <path d="M12 4v4" />
                <path d="M10.5 8h3l-.5 4h-2z" />
                <path d="M10.5 8C8 6 5 4.5 2 4.5" />
                <path d="M13.5 8C16 6 19 4.5 22 4.5" />
            </svg>
        );

        // --- Aplicación Principal ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('calendario'); 
            const [editingDay, setEditingDay] = useState(null); 
            const [showInstallBanner, setShowInstallBanner] = useState(false);
            
            const [selectedYear, setSelectedYear] = useState(Math.max(2026, new Date().getFullYear()));
            const [currentMesocycle, setCurrentMesocycle] = useState(1);
            const [currentWeek, setCurrentWeek] = useState(1);
            
            // Cargar datos de localStorage
            const [plan, setPlan] = useState(() => {
                const savedPlan = localStorage.getItem('sprintRelaxPlan');
                return savedPlan ? JSON.parse(savedPlan) : {};
            }); 
            
            // Estado Editor
            const [sessionType, setSessionType] = useState('carrera');
            const [sessionName, setSessionName] = useState('');
            const [intervals, setIntervals] = useState([]); 
            const [swimBlocks, setSwimBlocks] = useState([]);
            const [ropeBlocks, setRopeBlocks] = useState([]);
            const [exercises, setExercises] = useState([]);

            // Estado Herramientas
            const [activeTool, setActiveTool] = useState('vam');

            // Estado VAM
            const [vamDistance, setVamDistance] = useState('2000');
            const [vamMin, setVamMin] = useState('7');
            const [vamSec, setVamSec] = useState('30');

            // Estado Natación
            const [swimDistance, setSwimDistance] = useState('400');
            const [swimMin, setSwimMin] = useState('6');
            const [swimSec, setSwimSec] = useState('00');

            // Estado Dominadas
            const [pullupBw, setPullupBw] = useState('75');
            const [pullupAw, setPullupAw] = useState('20');
            const [pullupReps, setPullupReps] = useState('5');
            const [targetReps, setTargetReps] = useState('8');
            const [targetRpe, setTargetRpe] = useState('8');

            // ESTADO: ROMs Guardados en LocalStorage para VBT
            const [savedROMs, setSavedROMs] = useState(() => {
                const saved = localStorage.getItem('sprintRelaxROMs');
                return saved ? JSON.parse(saved) : { sentadilla: '60', banca: '45', muerto: '50', dominadas: '55' };
            });

            // Estado VBT
            const [vbtExercise, setVbtExercise] = useState('sentadilla');
            const [vbtRom, setVbtRom] = useState(() => {
                const saved = localStorage.getItem('sprintRelaxROMs');
                const parsed = saved ? JSON.parse(saved) : { sentadilla: '60', banca: '45', muerto: '50', dominadas: '55' };
                return parsed['sentadilla'];
            });
            const [vbtWeight, setVbtWeight] = useState('100');
            const [vbtFps, setVbtFps] = useState('60');
            const [isDetectingFps, setIsDetectingFps] = useState(false);
            const [vbtVideoUrl, setVbtVideoUrl] = useState(null);
            const [vbtStartTime, setVbtStartTime] = useState(null);
            const [vbtEndTime, setVbtEndTime] = useState(null);
            const [vbtTargetReps, setVbtTargetReps] = useState('5');
            const [vbtTargetRpe, setVbtTargetRpe] = useState('8');
            const videoRef = useRef(null);

            // RMs Guardados
            const [saved1RMs, setSaved1RMs] = useState(() => {
                const saved = localStorage.getItem('sprintRelax1RMs');
                return saved ? JSON.parse(saved) : { sentadilla: 0, banca: 0, muerto: 0, dominadas: 0 };
            });

            // Pruebas y Tests Personalizados
            const [customTests, setCustomTests] = useState(() => {
                const saved = localStorage.getItem('sprintRelaxCustomTests');
                return saved ? JSON.parse(saved) : [];
            });
            const [hiddenTests, setHiddenTests] = useState(new Set());

            const [profileDate, setProfileDate] = useState(new Date());

            const [activeVideo, setActiveVideo] = useState(null);
            const days = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
            const weekScrollRef = useRef(null);
            const startWeek = (currentMesocycle - 1) * 4 + 1;

            useEffect(() => {
                const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
                setShowInstallBanner(!isPWA);
            }, []);

            useEffect(() => {
                localStorage.setItem('sprintRelaxPlan', JSON.stringify(plan));
            }, [plan]);

            // EFECTO: Guardar RMs automáticamente
            useEffect(() => {
                localStorage.setItem('sprintRelax1RMs', JSON.stringify(saved1RMs));
            }, [saved1RMs]);

            // EFECTO: Guardar ROMs automáticamente
            useEffect(() => {
                localStorage.setItem('sprintRelaxROMs', JSON.stringify(savedROMs));
            }, [savedROMs]);

            // EFECTO: Guardar Tests automáticamente
            useEffect(() => {
                localStorage.setItem('sprintRelaxCustomTests', JSON.stringify(customTests));
            }, [customTests]);

            // --- Cálculos Natación ---
            const calculateSwimPace = () => {
                const d = parseFloat(swimDistance) || 0;
                const m = parseInt(swimMin) || 0;
                const s = parseInt(swimSec) || 0;
                const totalSeconds = (m * 60) + s;
                if (d === 0 || totalSeconds === 0) return 0;
                return (totalSeconds / d) * 100; // Segundos por cada 100m
            };
            const currentSwimPace = calculateSwimPace();

            const getSwimPace100m = (basePaceSec, percent) => {
                if (basePaceSec === 0) return "0:00";
                const targetSec = basePaceSec / (percent / 100);
                const mins = Math.floor(targetSec / 60);
                const secs = (targetSec % 60).toFixed(0);
                return `${mins}:${secs.padStart(2, '0')}`;
            };

            const getSwimPace25m = (basePaceSec, percent) => {
                if (basePaceSec === 0) return "0:00.0";
                const targetSec100 = basePaceSec / (percent / 100);
                const targetSec25 = targetSec100 / 4;
                const mins = Math.floor(targetSec25 / 60);
                const secs = (targetSec25 % 60).toFixed(1);
                if (mins > 0) return `${mins}:${secs.padStart(4, '0')}`;
                return `${secs}s`;
            };

            // --- Cálculos Básicos de Rendimiento (VAM & Dominadas) ---
            const calculateVAM = () => {
                const d = parseFloat(vamDistance) || 0;
                const m = parseInt(vamMin) || 0;
                const s = parseInt(vamSec) || 0;
                const totalSeconds = (m * 60) + s;
                if (d === 0 || totalSeconds === 0) return 0;
                return (d / totalSeconds) * 3.6;
            };
            const currentVam = calculateVAM();

            const getPace100m = (vamKmh, percent) => {
                if (vamKmh === 0) return "0:00.0";
                const targetVamKmh = vamKmh * (percent / 100);
                const targetMs = targetVamKmh / 3.6;
                if (targetMs === 0) return "0:00.0";
                const sec100m = 100 / targetMs;
                const mins = Math.floor(sec100m / 60);
                const secs = (sec100m % 60).toFixed(1);
                return `${mins}:${secs.padStart(4, '0')}`;
            };

            const bw = parseFloat(pullupBw) || 0;
            const aw = parseFloat(pullupAw) || 0;
            const reps = parseInt(pullupReps) || 0;
            const tReps = parseInt(targetReps) || 0;
            const tRpe = parseFloat(targetRpe) || 0;
            const totalWeight = bw + aw;
            const total1Rm = reps > 0 ? totalWeight * (1 + reps / 30) : 0;
            const lastre1Rm = total1Rm - bw;
            const rir = Math.max(0, 10 - tRpe);
            const theoreticalReps = tReps + rir;
            const targetTotalWeight = theoreticalReps > 0 && total1Rm > 0 ? total1Rm / (1 + theoreticalReps / 30) : 0;
            const recommendedLastre = targetTotalWeight > 0 ? targetTotalWeight - bw : 0;
            const formatLastre = (weight) => {
                if (weight > 0) return `+${weight.toFixed(1)} kg`;
                if (weight < 0) return `-${Math.abs(weight).toFixed(1)} kg (Gomas/Asistidas)`;
                return `0 kg (Peso corporal)`;
            };

            // --- Lógica Navegación y Fechas ---
            const getFirstMondayOfYear = (year) => {
                let date = new Date(year, 0, 1);
                while (date.getDay() !== 1) { // 1 es Lunes
                    date.setDate(date.getDate() + 1);
                }
                return date;
            };

            const getMesocycleDates = (year, meso) => {
                const firstMonday = getFirstMondayOfYear(year);
                const startDaysOffset = (meso - 1) * 28; // 4 semanas = 28 días
                
                const startDate = new Date(firstMonday);
                startDate.setDate(startDate.getDate() + startDaysOffset);
                
                const endDate = new Date(startDate);
                endDate.setDate(endDate.getDate() + 27); // + 27 días = hasta el domingo final

                const options = { month: 'short', day: 'numeric' };
                const startStr = startDate.toLocaleDateString('es-ES', options);
                const endStr = endDate.toLocaleDateString('es-ES', options);

                return `${startStr} - ${endStr}`;
            };

            const getExactDate = (year, week, dayIndex) => {
                const firstMonday = getFirstMondayOfYear(year);
                const targetDate = new Date(firstMonday);
                targetDate.setDate(targetDate.getDate() + (week - 1) * 7 + dayIndex);
                return targetDate;
            };

            const handlePrevMeso = () => {
                if (currentMesocycle > 1) {
                    const newMeso = currentMesocycle - 1;
                    setCurrentMesocycle(newMeso);
                    setCurrentWeek((newMeso - 1) * 4 + 1);
                }
            };

            const handleNextMeso = () => {
                const newMeso = currentMesocycle + 1;
                setCurrentMesocycle(newMeso);
                setCurrentWeek((newMeso - 1) * 4 + 1);
            };

            const openEditor = (year, week, day) => {
                // Retrocompatibilidad con planes antiguos (sin año)
                const key = plan[`${year}-${week}-${day}`] ? `${year}-${week}-${day}` : `${week}-${day}`;
                const session = plan[key] || plan[`${year}-${week}-${day}`];
                
                setEditingDay({ year, week, day });
                
                if (session) {
                    setSessionType(session.type);
                    setSessionName(session.name);
                    if (session.type === 'carrera') setIntervals(session.data || []);
                    else if (session.type === 'fuerza') setExercises(session.data || []);
                    else if (session.type === 'natacion') setSwimBlocks(session.data || []);
                    else if (session.type === 'cuerda') setRopeBlocks(session.data || []);
                    else if (session.type === 'descanso') {
                        setIntervals([]); setExercises([]); setSwimBlocks([]); setRopeBlocks([]);
                    }
                } else {
                    setSessionType('carrera'); setSessionName(''); setIntervals([]); setExercises([]); setSwimBlocks([]); setRopeBlocks([]);
                }
                setActiveTab('editor');
            };

            const saveAndReturn = () => {
                if (!editingDay) return;
                let data = [];
                if (sessionType === 'carrera') data = [...intervals];
                else if (sessionType === 'fuerza') data = [...exercises];
                else if (sessionType === 'natacion') data = [...swimBlocks];
                else if (sessionType === 'cuerda') data = [...ropeBlocks];
                else if (sessionType === 'descanso') data = [];

                const key = `${editingDay.year}-${editingDay.week}-${editingDay.day}`;
                const fallbackKey = `${editingDay.week}-${editingDay.day}`;
                const existingNotes = plan[key]?.notasAlumno || plan[fallbackKey]?.notasAlumno || '';
                
                const newPlan = { ...plan };
                if (newPlan[fallbackKey]) delete newPlan[fallbackKey];

                newPlan[key] = {
                    name: sessionType === 'descanso' ? 'Día de descanso' : (sessionName || `Sesión de ${sessionType}`),
                    type: sessionType,
                    data: data,
                    notasAlumno: existingNotes 
                };

                setPlan(newPlan);
                setEditingDay(null);
                setActiveTab('calendario');
            };

            const updateStudentNotes = (year, week, day, notes) => {
                const key = plan[`${year}-${week}-${day}`] ? `${year}-${week}-${day}` : `${week}-${day}`;
                if(plan[key]) {
                    setPlan(prev => ({
                        ...prev,
                        [key]: { ...prev[key], notasAlumno: notes }
                    }));
                }
            };

            const updateItemField = (blockId, itemId, field, value, type) => {
                let setter, list;
                if (type === 'fuerza') { setter = setExercises; list = exercises; }
                else if (type === 'cuerda') { setter = setRopeBlocks; list = ropeBlocks; }
                else if (type === 'natacion') { setter = setSwimBlocks; list = swimBlocks; }
                
                const newList = list.map(block => {
                    if (block.id !== blockId) return block;
                    return {
                        ...block,
                        items: block.items.map(item => item.id !== itemId ? item : { ...item, [field]: value })
                    };
                });
                setter(newList);
            };

            const deleteBlock = (id, listType) => {
                if (listType === 'carrera') setIntervals(intervals.filter(i => i.id !== id));
                if (listType === 'fuerza') setExercises(exercises.filter(i => i.id !== id));
                if (listType === 'natacion') setSwimBlocks(swimBlocks.filter(i => i.id !== id));
                if (listType === 'cuerda') setRopeBlocks(ropeBlocks.filter(i => i.id !== id));
            };

            const getSessionTheme = (type) => {
                switch (type) {
                    case 'carrera': return { bg: 'bg-yellow-500/10', border: 'border-yellow-500/30', accent: 'text-yellow-400', iconBg: 'bg-yellow-500/20', icon: <Zap size={18}/> };
                    case 'fuerza': return { bg: 'bg-orange-500/10', border: 'border-orange-500/30', accent: 'text-orange-400', iconBg: 'bg-orange-500/20', icon: <Dumbbell size={18}/> };
                    case 'natacion': return { bg: 'bg-blue-500/10', border: 'border-blue-500/30', accent: 'text-blue-400', iconBg: 'bg-blue-500/20', icon: <Waves size={18}/> };
                    case 'cuerda': return { bg: 'bg-emerald-500/10', border: 'border-emerald-500/30', accent: 'text-emerald-400', iconBg: 'bg-emerald-500/20', icon: <Timer size={18}/> };
                    default: return { bg: 'bg-zinc-500/5', border: 'border-zinc-500/20', accent: 'text-zinc-400', iconBg: 'bg-zinc-500/10', icon: <Moon size={18}/> };
                }
            };

            // --- Función para extraer ID de YouTube ---
            const getYoutubeVideoId = (url) => {
                if (!url) return null;
                try {
                    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|shorts\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                    const match = url.match(regExp);
                    if (match && match[2].length === 11) return match[2];
                    if (url.length === 11) return url;
                } catch (e) {
                    console.error("Error al procesar URL de YouTube", e);
                }
                return null;
            };

            // --- Cálculos VBT ---
            const handleVideoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setVbtVideoUrl(URL.createObjectURL(file));
                    setVbtStartTime(null);
                    setVbtEndTime(null);
                    setIsDetectingFps(true);

                    // --- FIX ERRORES MP4BOX EN CONSOLA ---
                    if (typeof window.Log !== 'undefined') {
                        window.Log.error = () => {};
                        window.Log.warn = () => {};
                        window.Log.info = () => {};
                        window.Log.debug = () => {};
                    }

                    if (window.MP4Box && file.size <= 100 * 1024 * 1024) {
                        const mp4boxfile = MP4Box.createFile();
                        
                        mp4boxfile.onReady = (info) => {
                            if (info.videoTracks && info.videoTracks.length > 0) {
                                const videoTrack = info.videoTracks[0];
                                if (videoTrack.nb_samples && videoTrack.duration) {
                                    const fps = Math.round(videoTrack.nb_samples / (videoTrack.duration / videoTrack.timescale));
                                    const std = [24, 25, 30, 50, 60, 120, 240];
                                    const closest = std.reduce((prev, curr) => Math.abs(curr - fps) < Math.abs(prev - fps) ? curr : prev);
                                    setVbtFps(closest.toString());
                                }
                            }
                            setIsDetectingFps(false);
                        };
                        
                        mp4boxfile.onError = () => {
                            setVbtFps('60'); 
                            setIsDetectingFps(false);
                        };
                        
                        const reader = new FileReader();
                        reader.onload = (evt) => {
                            const buffer = evt.target.result;
                            buffer.fileStart = 0;
                            try {
                                mp4boxfile.appendBuffer(buffer);
                                mp4boxfile.flush();
                            } catch (err) {
                                setVbtFps('60'); 
                                setIsDetectingFps(false);
                            }
                        };
                        reader.onerror = () => {
                            setVbtFps('60'); 
                            setIsDetectingFps(false);
                        };
                        
                        reader.readAsArrayBuffer(file);
                    } else {
                        setVbtFps('60'); 
                        setIsDetectingFps(false);
                    }
                }
            };
            
            const markTime = (type) => {
                if (videoRef.current) {
                    if (type === 'start') setVbtStartTime(videoRef.current.currentTime);
                    if (type === 'end') setVbtEndTime(videoRef.current.currentTime);
                }
            };
            
            const handleStepFrame = (direction) => {
                if (videoRef.current) {
                    const fps = parseFloat(vbtFps) || 60;
                    videoRef.current.currentTime += direction * (1 / fps);
                }
            };
            
            const vbtTime = (vbtStartTime !== null && vbtEndTime !== null && vbtEndTime > vbtStartTime) ? (vbtEndTime - vbtStartTime) : 0;
            const vbtVelocity = vbtTime > 0 ? (parseFloat(vbtRom) / 100) / vbtTime : 0;
            
            const calculateVbt1Rm = () => {
                if (vbtVelocity <= 0 || !vbtWeight) return 0;
                let percent1Rm = 0;
                const v = vbtVelocity;
                
                if (vbtExercise === 'sentadilla') {
                    percent1Rm = 100 - (v - 0.32) * 66.6;
                } else if (vbtExercise === 'banca') {
                    percent1Rm = 100 - (v - 0.18) * 57.1;
                } else if (vbtExercise === 'muerto') {
                    percent1Rm = 100 - (v - 0.14) * 66.6;
                } else if (vbtExercise === 'dominadas') {
                    percent1Rm = 100 - (v - 0.22) * 57.1;
                }
                
                if (percent1Rm > 100) percent1Rm = 100;
                if (percent1Rm < 30) percent1Rm = 30;
                return parseFloat(vbtWeight) / (percent1Rm / 100);
            };

            const currentVbt1Rm = calculateVbt1Rm();
            const effectiveVbt1Rm = currentVbt1Rm > 0 ? currentVbt1Rm : (saved1RMs[vbtExercise] || 0);
            const recommendedVbtWeight = (effectiveVbt1Rm > 0) ? effectiveVbt1Rm / (1 + (parseInt(vbtTargetReps) + (10 - parseFloat(vbtTargetRpe))) / 30) : 0;

            // --- Lógica Tests Personalizados ---
            const handleAddTest = () => {
                const newTest = { 
                    id: Math.random().toString(),

                    color: TEST_COLORS[customTests.length % TEST_COLORS.length],

            };

                setCustomTests(customTests.map(t => t.id === id ? { ...t, name } : t));

                setCustomTests(customTests.map(t => {
                    if (t.id !== id) return t;
                    const currIdx = TEST_COLORS.indexOf(t.color || '#10B981');
                    const nextColor = TEST_COLORS[(currIdx + 1) % TEST_COLORS.length];
                    return { ...t, color: nextColor };
                }));
            };

            const deleteTest = (id) => {
                setCustomTests(customTests.filter(t => t.id !== id));
            };

            const toggleTestVisibility = (id) => {

                            ...t,

                        };
                    }
                    return t;
                }));

            };

            const deleteRecord = (testId, recordId) => {
                setCustomTests(customTests.map(t => {

                        return { ...t, records: t.records.filter(r => r.id !== recordId) };

                }));
            };

            const calendarMap = React.useMemo(() => {
                const map = {};

                                        </div>
                                    )}

                                    <div className="space-y-4">
                                        {customTests.map(test => {
                                            const color = test.color || '#10B981';
                                            return (
                                            <div key={test.id} className="bg-[#1F1F23] border border-[#27272A] rounded-[20px] p-4 space-y-4 relative focus-within:border-[#3F3F46] transition-all">
                                                <div className="flex justify-between items-center gap-3">
                                                    <button 
                                                        onClick={() => cycleTestColor(test.id)}
                                                        className="w-5 h-5 rounded-full flex-shrink-0 shadow-inner outline outline-2 outline-transparent active:scale-90 transition-all cursor-pointer"
                                                        style={{ backgroundColor: color, outlineColor: `${color}40`, boxShadow: `0 0 10px ${color}20` }}
                                                        title="Cambiar color"
                                                    />
                                                    <input 
                                                        value={test.name} 
                                                        onChange={e => updateTestName(test.id, e.target.value)}
                                                        className="bg-transparent font-black text-white text-lg outline-none w-full placeholder-[#52525B]"
                                                        placeholder="Nombre de la prueba (Ej: 1000m, Dominadas...)"
                                                    />
                                                    <button onClick={() => deleteTest(test.id)} className="p-2 text-[#52525B] hover:text-red-500 transition-colors flex-shrink-0"><Trash2 size={16}/></button>
                                                </div>

                                                <div className="flex gap-2">
                                                    <input type="date" className="bg-[#0A0A0C] text-[#A1A1AA] text-[11px] font-bold p-3 rounded-[12px] border border-[#27272A] focus:border-[#52525B] outline-none w-[110px]" id={`date-${test.id}`} defaultValue={new Date().toISOString().split('T')[0]} />
                                                    <input type="text" placeholder="Marca (ej: 15 o 3:30)" className="bg-[#0A0A0C] text-white text-xs font-black p-3 rounded-[12px] border border-[#27272A] focus:border-[#52525B] outline-none flex-1" id={`val-${test.id}`} />
                                                    <button onClick={() => handleAddRecord(test.id)} className="text-white px-4 rounded-[12px] text-[12px] font-black active:scale-95 transition-all shadow-md" style={{ backgroundColor: color }}><Plus size={16}/></button>
                                                </div>

                                                {test.records.length > 0 && (
                                                    <div className="space-y-1.5 mt-3 pt-3 border-t border-[#27272A]">
                                                        {test.records.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(rec => {
                                                            const [year, month, day] = rec.date.split('-');
                                                            return (
                                                                <div key={rec.id} className="flex justify-between items-center text-[11px] bg-[#0A0A0C]/50 px-3 py-2.5 rounded-[12px] border border-[#27272A]/50">
                                                                    <span className="text-[#71717A] font-bold">{day}/{month}/{year}</span>
                                                                    <div className="flex items-center gap-3">
                                                                        <span className="font-black text-[13px] tracking-tight" style={{ color: color }}>{rec.value}</span>
                                                                        <button onClick={() => deleteRecord(test.id, rec.id)} className="text-[#52525B] active:text-red-500 p-1"><X size={12}/></button>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                )}
                                            </div>
                                            )
                                        })}
                                    </div>
                                </div>

                                {/* Sección Calendario Mensual */}
                                <div className="p-5 rounded-[24px] bg-[#141417] border border-[#27272A] space-y-4 shadow-sm">
                                    <div className="flex items-center gap-3 border-b border-[#1F1F23] pb-4">
                                        <div className="p-2.5 rounded-[12px] bg-[#F97316]/10 text-[#F97316]"><Calendar size={20}/></div>
                                        <h3 className="text-[14px] font-black text-white uppercase tracking-tight">Historial de Entrenamientos</h3>
                                    </div>
                                    
                                    <div className="flex justify-between items-center bg-[#18181B] p-2 rounded-[16px] border border-[#27272A]">
                                        <button onClick={() => setProfileDate(new Date(profileDate.getFullYear(), profileDate.getMonth() - 1, 1))} className="p-2 text-[#A1A1AA] hover:text-white transition-all rounded-lg active:bg-[#27272A]"><ChevronLeft size={16}/></button>
                                        <span className="text-[11px] font-black uppercase tracking-widest text-white">
                                            {['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'][profileDate.getMonth()]} {profileDate.getFullYear()}
                                        </span>
                                        <button onClick={() => setProfileDate(new Date(profileDate.getFullYear(), profileDate.getMonth() + 1, 1))} className="p-2 text-[#A1A1AA] hover:text-white transition-all rounded-lg active:bg-[#27272A]"><ChevronRight size={16}/></button>
                                    </div>

                                    <div className="grid grid-cols-7 gap-1 mt-4">
                                        {['L', 'M', 'X', 'J', 'V', 'S', 'D'].map(d => (
                                            <div key={d} className="text-center text-[9px] font-black text-[#71717A] mb-2">{d}</div>
                                        ))}
                                        
                                        {Array.from({ length: (() => {
                                            let offset = new Date(profileDate.getFullYear(), profileDate.getMonth(), 1).getDay() - 1;
                                            return offset === -1 ? 6 : offset;
                                        })() }).map((_, i) => <div key={`empty-${i}`} className="aspect-square" />)}
                                        
                                        {Array.from({ length: new Date(profileDate.getFullYear(), profileDate.getMonth() + 1, 0).getDate() }).map((_, i) => {
                                            const d = i + 1;
                                            const dateStr = `${profileDate.getFullYear()}-${String(profileDate.getMonth()+1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                                            const session = calendarMap[dateStr];
                                            const isToday = new Date().toDateString() === new Date(profileDate.getFullYear(), profileDate.getMonth(), d).toDateString();
                                            
                                            let indicatorClass = "bg-transparent";
                                            if (session) {
                                                if (session.type === 'carrera') indicatorClass = "bg-yellow-500 shadow-[0_0_8px_rgba(234,179,8,0.5)]";
                                                else if (session.type === 'fuerza') indicatorClass = "bg-orange-500 shadow-[0_0_8px_rgba(249,115,22,0.5)]";
                                                else if (session.type === 'natacion') indicatorClass = "bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.5)]";
                                                else if (session.type === 'cuerda') indicatorClass = "bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]";
                                                else if (session.type === 'descanso') indicatorClass = "bg-[#52525B]";
                                            }

                                            return (
                                                <div key={d} className={`aspect-square flex flex-col items-center justify-center rounded-[12px] relative border transition-all ${isToday ? 'border-[#F97316] bg-[#F97316]/10' : 'border-[#27272A] bg-[#1F1F23]'}`}>
                                                    <span className={`text-[11px] font-bold ${isToday ? 'text-[#F97316]' : 'text-white'}`}>{d}</span>
                                                    {session && <div className={`w-1.5 h-1.5 rounded-full mt-0.5 ${indicatorClass}`} />}
                                                </div>
                                            );
                                        })}
                                    </div>
                                    
                                    <div className="flex flex-wrap gap-3 justify-center pt-3 border-t border-[#1F1F23] mt-2">
                                        {[
                                            {label: 'Carrera', color: 'bg-yellow-500'},
                                            {label: 'Fuerza', color: 'bg-orange-500'},
                                            {label: 'Natación', color: 'bg-blue-500'},
                                            {label: 'Cuerda', color: 'bg-emerald-500'},
                                            {label: 'Descanso', color: 'bg-[#52525B]'}
                                        ].map(l => (
                                            <div key={l.label} className="flex items-center gap-1.5">
                                                <div className={`w-2 h-2 rounded-full ${l.color}`} />
                                                <span className="text-[9px] font-black uppercase text-[#71717A] tracking-widest">{l.label}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Reproductor de Video (Modal Nativo) */}
                    {activeVideo && (
                        <div className="fixed inset-0 z-[100] bg-black/95 backdrop-blur-md flex flex-col items-center justify-center animate-in fade-in duration-300">
                            <div className="w-full max-w-xl px-4 flex justify-between items-center mb-4">
                                <a href={`https://www.youtube.com/watch?v=${activeVideo}`} target="_blank" rel="noopener noreferrer" className="flex items-center gap-2 text-[11px] font-bold bg-red-500/10 text-red-500 px-3 py-2 rounded-xl border border-red-500/20 active:scale-95 transition-all">
                                    <Youtube size={14} /> Abrir en App / Externo
                                </a>
                                <button onClick={() => setActiveVideo(null)} className="w-10 h-10 bg-[#1F1F23] rounded-full flex items-center justify-center text-white active:scale-90 transition-all shadow-lg border border-[#27272A]">
                                    <X size={20} />
                                </button>
                            </div>
                            <div className="w-full max-w-xl px-4">
                                <div className="aspect-video bg-black rounded-2xl overflow-hidden border border-[#27272A] shadow-2xl">
                                    <iframe 
                                        src={`https://www.youtube.com/embed/${activeVideo}?autoplay=1`} 
                                        className="w-full h-full" 
                                        frameBorder="0" 
                                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                        allowFullScreen
                                    ></iframe>
                                </div>
                                <p className="text-center text-[10px] font-black uppercase tracking-widest text-[#71717A] mt-6">Si el vídeo da error, usa el botón superior para abrirlo en YouTube</p>
                            </div>
                        </div>
                    )}

                    {/* Tab Bar Inferior */}
                    {activeTab !== 'editor' && (
                        <nav className="fixed bottom-0 w-full bg-[#141417]/95 backdrop-blur-xl border-t border-[#27272A] pb-[max(0.8rem,env(safe-area-inset-bottom))] pt-2.5 px-4 z-50 flex justify-around shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
                            <button onClick={() => setActiveTab('calendario')} className={`flex flex-col items-center gap-1.5 transition-all p-2 w-[85px] active:scale-95 ${activeTab === 'calendario' ? 'text-[#F97316]' : 'text-[#71717A]'}`}>
                                <Calendar size={20} />
                                <span className="text-[9px] font-black uppercase tracking-widest text-center leading-tight">Editor de Entrenamiento</span>
                            </button>
                            <button onClick={() => setActiveTab('resumen')} className={`flex flex-col items-center gap-1.5 transition-all p-2 w-[85px] active:scale-95 ${activeTab === 'resumen' ? 'text-[#F97316]' : 'text-[#71717A]'}`}>
                                <FileText size={20} />
                                <span className="text-[9px] font-black uppercase tracking-widest text-center leading-tight">Entrenamiento</span>
                            </button>
                            <button onClick={() => setActiveTab('herramientas')} className={`flex flex-col items-center gap-1.5 transition-all p-2 w-[72px] active:scale-95 ${activeTab === 'herramientas' ? 'text-[#F97316]' : 'text-[#71717A]'}`}>
                                <Calculator size={20} />
                                <span className="text-[9px] font-black uppercase tracking-widest">Herram.</span>
                            </button>
                            <button onClick={() => setActiveTab('perfil')} className={`flex flex-col items-center gap-1.5 transition-all p-2 w-[72px] active:scale-95 ${activeTab === 'perfil' ? 'text-[#F97316]' : 'text-[#71717A]'}`}>
                                <User size={20} />
                                <span className="text-[9px] font-black uppercase tracking-widest">Perfil</span>
                            </button>
                        </nav>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
